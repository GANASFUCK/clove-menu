<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Clove - Menu</title>
    <meta name="description" content="Menu digitale Clove.">
    <meta property="og:title" content="Clove - Menu">
    <meta property="og:description" content="Spicchi, fritti e dolci Clove.">
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;700;800;900&family=Syne:wght@400;500;600;700&display=swap");

      :root {
        --clove-purple: #5c2a80;
        --clove-cream: #f2eee9;
        --clove-cream-light: #fbf8f3;
        --clove-white: #fffefa;
        --header-height: 78px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: var(--clove-cream);
        color: var(--clove-purple);
        font-family: "Obviously", "Barlow Condensed", "Arial Narrow", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
      }

      button {
        font: inherit;
      }

      .app-shell {
        min-height: 100svh;
        overflow-x: clip;
        background: var(--clove-cream);
      }

      .menu-header {
        position: sticky;
        top: 0;
        z-index: 30;
        height: var(--header-height);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 0 23px 0 25px;
        background: var(--clove-cream);
        border-bottom: 1.5px solid var(--clove-purple);
      }

      .brand-logo {
        display: grid;
        place-items: center start;
        width: 96px;
        height: 23px;
        color: var(--clove-purple);
        text-decoration: none;
        transform-origin: left center;
      }

      .brand-logo__img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .menu-link {
        width: clamp(168px, 45vw, 188px);
        min-width: 0;
        min-height: 34px;
        border: 1.5px solid var(--clove-purple);
        border-radius: 999px;
        padding: 5px 13px 7px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: transparent;
        color: var(--clove-purple);
        font-size: 18px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: 0;
        text-align: center;
        text-transform: uppercase;
        transform: scaleX(0.82);
        transform-origin: right center;
        cursor: pointer;
        transition: background 160ms ease, color 160ms ease, transform 160ms ease;
        -webkit-tap-highlight-color: transparent;
      }

      .menu-link__label {
        display: block;
        min-width: 0;
        overflow: hidden;
        text-overflow: clip;
        white-space: nowrap;
        transform: translateY(1px);
      }

      .menu-link.is-filled {
        background: var(--clove-purple);
        color: var(--clove-white);
      }

      .order-count {
        min-width: 19px;
        height: 19px;
        padding: 1px 5px 0;
        display: inline-grid;
        place-items: center;
        border-radius: 999px;
        background: currentColor;
        color: var(--clove-cream);
        font-size: 13px;
        font-weight: 900;
        line-height: 1;
        transform: translateY(1px) scale(1);
        transform-origin: center;
      }

      .menu-link.is-filled .order-count {
        background: var(--clove-white);
        color: var(--clove-purple);
      }

      .order-count[hidden] {
        display: none;
      }

      .order-count.is-bouncing {
        animation: order-count-bounce 360ms cubic-bezier(0.2, 0.9, 0.2, 1.2);
      }

      @keyframes order-count-bounce {
        0% {
          transform: translateY(1px) scale(0.86);
        }

        48% {
          transform: translateY(1px) scale(1.24);
        }

        100% {
          transform: translateY(1px) scale(1);
        }
      }

      .menu-link:active {
        transform: scaleX(0.82) scale(0.965);
      }

      .view {
        display: block;
      }

      .view[hidden] {
        display: none;
      }

      .product-section {
        --photo-width: min(84vw, 390px);
        --photo-height: 274px;
        --title-size: clamp(106px, 28.5vw, 154px);
        position: relative;
        min-height: calc(100svh - var(--header-height));
        scroll-margin-top: var(--header-height);
        padding: 52px 18px 36px;
        display: flex;
        flex-direction: column;
        align-items: center;
        border-bottom: 1.5px solid rgba(92, 42, 128, 0.18);
      }

      .product-section.is-portrait {
        --photo-width: min(84vw, 390px);
        --photo-height: 274px;
      }

      .product-section.is-wide {
        --photo-width: min(84vw, 390px);
      }

      .product-section.is-dessert {
        --photo-width: min(84vw, 390px);
      }

      .product-section.is-mini-suppli {
        --photo-width: min(106vw, 620px);
        --photo-height: 430px;
      }

      .product-section.is-gianduia {
        --photo-width: min(94vw, 488px);
        --photo-height: 382px;
      }

      .product-section.is-n2 {
        --photo-width: min(93vw, 438px);
        --photo-height: 314px;
      }

      .product-title {
        position: relative;
        z-index: 1;
        width: max-content;
        max-width: none;
        margin: 0;
        color: var(--clove-purple);
        font-size: var(--title-size);
        font-weight: 900;
        line-height: 0.77;
        letter-spacing: 0;
        text-align: center;
        white-space: nowrap;
        transform: scaleX(0.72);
        transform-origin: center;
        will-change: transform;
      }

      .product-title.is-word {
        --title-size: clamp(62px, 17vw, 96px);
        width: max-content;
        white-space: nowrap;
        line-height: 0.78;
      }

      .product-title.is-long {
        --title-size: clamp(56px, 15.5vw, 86px);
      }

      .product-visual {
        position: relative;
        width: 100%;
        min-height: var(--photo-height);
        margin-top: 0;
      }

      .product-photo {
        position: absolute;
        top: 50%;
        left: 50%;
        z-index: 2;
        width: auto;
        height: auto;
        max-width: var(--photo-width);
        max-height: var(--photo-height);
        object-fit: contain;
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
        filter: drop-shadow(0 17px 15px rgba(43, 14, 88, 0.05));
      }

      .product-photo.is-visible {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      .product-section.is-n2 .product-photo,
      .product-section.is-n2 .product-photo.is-visible {
        top: 72%;
        transform: translate(-50%, -50%) scale(1.34);
      }

      .product-section.is-mini-suppli .product-visual,
      .product-section.is-gianduia .product-visual {
        overflow: hidden;
      }

      .product-section.is-mini-suppli .product-photo,
      .product-section.is-mini-suppli .product-photo.is-visible {
        width: min(106vw, 620px);
        max-width: none;
        max-height: none;
        top: 50%;
        transform: translate(-50%, -55%) scale(1);
        filter: none;
      }

      .product-section.is-gianduia .product-photo,
      .product-section.is-gianduia .product-photo.is-visible {
        width: min(93vw, 488px);
        max-width: none;
        max-height: none;
        top: 50%;
        transform: translate(-50%, -50%) scale(1);
        filter: none;
      }

      .visual-arrow {
        position: absolute;
        z-index: 3;
        right: clamp(24px, 8vw, 48px);
        top: 50%;
        transform: translateY(-42%) scaleX(1.2);
        transform-origin: center;
        pointer-events: none;
      }

      .product-section.is-portrait .visual-arrow {
        right: clamp(24px, 8vw, 48px);
        top: 50%;
      }

      .price {
        width: max-content;
        margin-top: -6px;
        color: var(--clove-purple);
        font-size: clamp(44px, 12vw, 62px);
        font-weight: 900;
        line-height: 0.8;
        letter-spacing: 0;
        text-align: center;
        transform: scaleX(0.78);
      }

      .scroll-arrow {
        width: 30px;
        height: 122px;
        object-fit: contain;
      }

      .ingredients {
        width: min(100%, 520px);
        margin: 8px auto 0;
        color: var(--clove-purple);
        font-size: clamp(17px, 4.55vw, 24px);
        font-weight: 500;
        line-height: 1.03;
        letter-spacing: 0;
        text-align: center;
        text-transform: uppercase;
        transform: scaleX(0.82);
      }

      .mark-button,
      .order-link,
      .back-button {
        align-self: center;
        min-width: 224px;
        min-height: 54px;
        margin-top: 19px;
        padding: 6px 39px 8px;
        border: 2px solid var(--clove-purple);
        border-radius: 999px;
        background: transparent;
        color: var(--clove-purple);
        font-size: 31px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: 0;
        text-align: center;
        cursor: pointer;
        transition: background 180ms ease, color 180ms ease, transform 180ms ease;
        -webkit-tap-highlight-color: transparent;
      }

      .mark-button:active,
      .order-link:active,
      .back-button:active {
        transform: scale(0.965);
      }

      .mark-button.is-selected,
      .order-link {
        background: var(--clove-purple);
        color: var(--clove-white);
      }

      .order-cta-section {
        min-height: calc(60svh - var(--header-height));
        padding: 64px 18px 72px;
        display: grid;
        place-items: center;
      }

      .order-link {
        width: min(86vw, 380px);
        text-decoration: none;
      }

      .order-page {
        min-height: calc(100svh - var(--header-height));
        position: relative;
        padding: 40px 17px 76px;
        overflow: hidden;
      }

      .order-page::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        background:
          linear-gradient(rgba(92, 42, 128, 0.055) 1px, transparent 1px),
          linear-gradient(90deg, rgba(92, 42, 128, 0.055) 1px, transparent 1px);
        background-size: 34px 34px;
        mask-image: linear-gradient(to bottom, transparent, #000 11%, #000 88%, transparent);
        pointer-events: none;
      }

      .order-page > * {
        position: relative;
        z-index: 1;
      }

      .order-title {
        width: max-content;
        max-width: none;
        margin: 0 auto 34px;
        color: var(--clove-purple);
        font-size: clamp(49px, 13vw, 76px);
        font-weight: 900;
        line-height: 0.82;
        letter-spacing: 0;
        text-align: center;
        white-space: nowrap;
        transform: scaleX(0.72);
      }

      .order-title::after {
        content: "SEGNATI";
        position: absolute;
        right: -18px;
        bottom: -21px;
        padding: 3px 11px 5px;
        border: 1.5px solid var(--clove-purple);
        border-radius: 999px;
        background: var(--clove-cream);
        color: var(--clove-purple);
        font-size: 18px;
        font-weight: 900;
        line-height: 0.9;
        transform: rotate(-7deg) scaleX(0.86);
      }

      .order-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 17px 13px;
        padding: 4px 0 0;
      }

      .order-card {
        position: relative;
        min-height: 218px;
        padding: 48px 9px 15px;
        display: grid;
        grid-template-rows: 1fr auto;
        align-items: center;
        justify-items: center;
        overflow: visible;
        background: var(--clove-white);
        border: 1.5px solid rgba(92, 42, 128, 0.42);
        box-shadow: 0 10px 0 rgba(92, 42, 128, 0.05);
        isolation: isolate;
        transform: rotate(-1.4deg);
      }

      .order-card:nth-child(2n) {
        transform: rotate(1.2deg);
      }

      .order-card:nth-child(3n) {
        transform: rotate(-0.6deg);
      }

      .order-card::before {
        content: "";
        position: absolute;
        top: -11px;
        left: 50%;
        z-index: 5;
        width: 20px;
        height: 20px;
        border: 1px solid rgba(92, 42, 128, 0.3);
        border-radius: 50%;
        background:
          radial-gradient(circle at 31% 28%, rgba(255, 255, 255, 0.72) 0 13%, transparent 14%),
          radial-gradient(circle at 58% 64%, #5c2a80 0 58%, #4a206a 59% 100%);
        box-shadow:
          4px 6px 0 rgba(92, 42, 128, 0.08),
          1px 3px 5px rgba(43, 14, 88, 0.13);
        transform: translateX(-50%);
      }

      .order-card::after {
        content: "";
        position: absolute;
        top: 6px;
        left: 50%;
        z-index: 4;
        width: 3px;
        height: 13px;
        border-radius: 999px;
        background: linear-gradient(90deg, #bbb8b3 0 38%, #fbf8f3 39% 62%, #9f9d99 63% 100%);
        box-shadow: 3px 5px 0 rgba(92, 42, 128, 0.04);
        transform: translateX(-50%) rotate(8deg);
        transform-origin: top center;
      }

      .order-card__pin-hole {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 10px;
        height: 10px;
        border: 1.5px solid var(--clove-purple);
        border-radius: 50%;
        background: var(--clove-cream);
      }

      /*
       * Enlarge the image for spicchio n2 in the order view. The previous
       * sizing made the photo appear noticeably smaller than the others. By
       * increasing both the maximum width and height and scaling it up slightly
       * more, the "NUMERO 2" slice is now consistent with the rest of the
       * selection. Adjust these values further if needed to better fit the
       * layout.
       */
      .order-card[data-product-id="n2"] .order-card__img {
        /* Allow the image to occupy a larger portion of its container */
        max-width: 120%;
        max-height: 160px;
        /* Slightly larger scale to compensate for the photo composition */
        transform: scale(1.3);
      }

      .order-card__logo {
        display: none;
      }

      .order-card__title {
        position: absolute;
        top: 40px;
        left: 50%;
        z-index: 1;
        width: max-content;
        margin: 0;
        color: var(--clove-purple);
        font-size: 44px;
        font-weight: 900;
        line-height: 0.78;
        letter-spacing: 0;
        text-align: center;
        white-space: nowrap;
        pointer-events: none;
        transform: translateX(-50%) scaleX(0.72);
      }

      .order-card__title.is-small {
        font-size: 32px;
      }

      .order-card__img {
        position: relative;
        z-index: 2;
        max-width: 98%;
        max-height: 129px;
        margin-top: 11px;
        object-fit: contain;
        filter: drop-shadow(0 9px 10px rgba(43, 14, 88, 0.05));
      }

      .order-card__meta {
        position: relative;
        z-index: 3;
        margin: 0;
        color: var(--clove-purple);
        font-size: 24px;
        font-weight: 900;
        line-height: 0.9;
        transform: scaleX(0.82);
      }

      .empty-order {
        margin: 48px auto 34px;
        max-width: 300px;
        color: var(--clove-purple);
        font-size: 30px;
        font-weight: 700;
        line-height: 0.95;
        text-align: center;
        transform: scaleX(0.8);
        padding: 30px 18px;
        border: 1.5px solid rgba(92, 42, 128, 0.45);
        background: var(--clove-white);
        box-shadow: 0 10px 0 rgba(92, 42, 128, 0.05);
      }

      .total-bar {
        position: static;
        width: min(100%, 520px);
        margin: 44px auto 0;
        display: none;
        justify-content: center;
        pointer-events: auto;
      }

      .total-bar[hidden] {
        display: none;
      }

      .order-page:not([hidden]) .total-bar {
        display: flex;
      }

      .order-page:not([hidden]) .total-bar[hidden] {
        display: none;
      }

      .total-bar__inner {
        width: min(100%, 390px);
        min-height: 0;
        position: relative;
        padding: 20px 20px 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        border: 0;
        background: transparent;
        color: var(--clove-purple);
        pointer-events: auto;
        transform: rotate(1deg);
      }

      .total-bar__inner::before {
        content: "TOT";
        position: absolute;
        top: 70px;
        right: clamp(44px, 18%, 78px);
        left: auto;
        padding: 3px 10px 5px;
        border: 1.5px solid var(--clove-purple);
        border-radius: 999px;
        background: var(--clove-cream);
        color: var(--clove-purple);
        font-size: 16px;
        font-weight: 900;
        line-height: 0.9;
        transform: rotate(-8deg) scaleX(0.86);
      }

      .total-bar__inner::after {
        content: "";
        width: min(78%, 286px);
        height: 1.5px;
        margin-top: 4px;
        background: var(--clove-purple);
        transform: rotate(-1deg);
      }

      .total-label,
      .total-value {
        font-weight: 900;
        line-height: 0.85;
        letter-spacing: 0;
        transform: scaleX(0.78);
      }

      .total-label {
        color: var(--clove-purple);
        font-size: clamp(36px, 10vw, 54px);
      }

      .total-value {
        color: var(--clove-purple);
        font-size: clamp(72px, 20vw, 112px);
      }

      .back-button {
        width: min(86vw, 360px);
        margin: 34px auto 0;
        display: block;
        background: transparent;
      }

      @media (max-width: 374px) {
        .menu-header {
          gap: 12px;
          padding-right: 15px;
          padding-left: 20px;
        }

        .brand-logo {
          width: 86px;
          height: 21px;
        }

        .menu-link {
          width: 166px;
          min-height: 32px;
          gap: 6px;
          padding-right: 9px;
          padding-left: 9px;
          font-size: 15px;
        }

        .product-section {
          --photo-width: min(84vw, 350px);
          padding-right: 12px;
          padding-left: 12px;
        }

        .product-section.is-portrait {
          --photo-width: min(84vw, 350px);
        }

        .product-section.is-mini-suppli {
          --photo-width: min(106vw, 430px);
          --photo-height: 372px;
        }

        .product-section.is-mini-suppli .product-photo,
        .product-section.is-mini-suppli .product-photo.is-visible {
          width: min(106vw, 430px);
        }

        .product-section.is-gianduia {
          --photo-width: min(92vw, 380px);
          --photo-height: 328px;
        }

        .product-section.is-gianduia .product-photo,
        .product-section.is-gianduia .product-photo.is-visible {
          width: min(92vw, 380px);
        }

        .product-section.is-n2 {
          --photo-width: min(91vw, 360px);
          --photo-height: 296px;
        }

        .product-title {
          --title-size: 96px;
        }

        .product-title.is-word {
          --title-size: 58px;
        }

        .product-title.is-long {
          --title-size: 52px;
        }

        .order-grid {
          gap: 10px;
        }

        .order-card {
          min-height: 190px;
        }
      }

      @media (max-width: 430px) {
        .product-title:not(.is-word) {
          --title-size: clamp(92px, 26vw, 104px);
        }
      }

      @media (min-width: 520px) {
        .app-shell {
          width: 558px;
          margin: 0 auto;
          border-right: 1px solid rgba(92, 42, 128, 0.12);
          border-left: 1px solid rgba(92, 42, 128, 0.12);
        }

        .product-section {
          min-height: 721px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="menu-header" aria-label="Header menu">
        <a class="brand-logo" href="#menu-view" aria-label="Clove">
          <!-- Use the provided Clove logo without the img/ prefix because images are served from the repository root -->
          <img class="brand-logo__img" src="logo-clove-purple.png" alt="">
        </a>
        <button class="menu-link" type="button" data-menu-button aria-label="Vai ai tuoi spicchi">
          <span class="menu-link__label" data-menu-button-label>VAI AI TUOI SPICCHI</span>
          <span class="order-count" data-order-count hidden>0</span>
        </button>
      </header>

      <section class="view" id="menu-view" aria-label="Menu Clove">
        <div id="product-list"></div>
        <section class="order-cta-section" aria-label="Vai ai tuoi spicchi">
          <button class="order-link" type="button" data-open-order>I TUOI SPICCHI →</button>
        </section>
      </section>

      <section class="view order-page" id="order-view" aria-label="I tuoi spicchi" hidden>
        <h1 class="order-title">I TUOI SPICCHI</h1>
        <div class="order-grid" id="order-grid"></div>
        <p class="empty-order" id="empty-order" hidden>ANCORA NIENTE SEGNATO</p>
        <div class="total-bar" aria-live="polite">
          <div class="total-bar__inner">
            <span class="total-label">TOTALE:</span>
            <span class="total-value" id="total-value">0,00€</span>
          </div>
        </div>
        <button class="back-button" type="button" data-back-menu>TORNA AL MENÙ</button>
      </section>
    </main>

    <script>
      const products = [
        {
          id: "n1",
          title: "NUMERO 1",
          ingredients: ["CAPOCOLLO DI MARTINA FRANCA  /", "STRACCIATELLA  /  OLIVA TAGGIASCA"],
          price: 350,
          image: "NUMERO_1_cut.png",
          alt: "Spicchio Numero 1 con capocollo, stracciatella e oliva taggiasca",
          imageClass: "is-wide"
        },
        {
          id: "n2",
          title: "NUMERO 2",
          ingredients: ["MELANZANA ARROSTO  /  CREMA DI POMODORO", "STRACCIATELLA  /  PARMIGIANO  /  BASILICO", "CRUMBLE DI PANE"],
          price: 350,
          image: "NUMERO_2_cut.png",
          alt: "Spicchio Numero 2 con melanzana arrosto e stracciatella",
          imageClass: "is-n2"
        },
        {
          id: "n3",
          title: "NUMERO 3",
          ingredients: ["ZUCCHINE ALLA SCAPECE  /  JULIENNE DI CAROTE ARROSTO  /", "RICOTTA ARTIGIANALE"],
          price: 350,
          image: "NUMERO_3_cut.png",

          alt: "Tris di mini supplì",
          imageClass: "is-portrait is-mini-suppli",
          eager: true
        },
        {

          title: "POLPETTINE",
          ingredients: ["POLPETTINE DI CARNE E OLIVE  /", "MAIONESE ALLE OLIVE"],
          price: 400,
          image: "POLPETTINE_menu.png",
          alt: "Polpettine di carne e olive con maionese alle olive",
          imageClass: "is-wide"
        },
        {
          id: "pasticcera",
          title: "PASTICCERA",
          ingredients: ["CREMA PASTICCERA  /  CARAMELLO  /", "ZUCCHERO A VELO"],
          price: 450,
          image: "PASTICCERA_cut.png",
          alt: "Dolce con crema pasticcera, caramello e zucchero a velo",
          imageClass: "is-dessert"
        },
        {
          id: "crema-latte",
          title: "CREMA LATTE",
          ingredients: ["CREMA DI LATTE ALLA VANIGLIA  /  CARAMELLO  /", "ZUCCHERO A VELO"],
          price: 450,
          image: "CREMA_LATTE_cut.png",
          alt: "Dolce con crema di latte alla vaniglia, caramello e zucchero a velo",
          imageClass: "is-dessert"
        },
        {
          id: "gianduia",
          title: "GIANDUIA",
          ingredients: ["CIOCCOLATO GIANDUIA  /  ZUCCHERO A VELO  /", "GRANELLA DI NOCCIOLA"],
          price: 450,
          image: "GIANDUIA_cut.png",
          alt: "Dolce con cioccolato gianduia, zucchero a velo e granella di nocciola",
          imageClass: "is-dessert is-gianduia",
          eager: true
        }
      ];

      const selected = new Set();
      const menuView = document.querySelector("#menu-view");
      const orderView = document.querySelector("#order-view");
      const productList = document.querySelector("#product-list");
      const orderGrid = document.querySelector("#order-grid");
      const emptyOrder = document.querySelector("#empty-order");
      const totalBar = document.querySelector(".total-bar");
      const totalValue = document.querySelector("#total-value");
      const menuButton = document.querySelector("[data-menu-button]");
      const menuButtonLabel = document.querySelector("[data-menu-button-label]");
      const orderCount = document.querySelector("[data-order-count]");
      const openOrderButton = document.querySelector("[data-open-order]");
      const backButton = document.querySelector("[data-back-menu]");
      let previousSelectedSize = 0;

      function formatPrice(cents) {
        return `${(cents / 100).toFixed(2).replace(".", ",")}€`;
      }

      function titleClass(product) {
        const classes = ["product-title"];
        if (!product.title.startsWith("NUMERO")) classes.push("is-word");
        if (product.title.length > 12) classes.push("is-long");
        return classes.join(" ");
      }

      function sectionClass(product) {
        return ["product-section", product.imageClass].filter(Boolean).join(" ");
      }

      function renderProducts() {
        const fragment = document.createDocumentFragment();

        products.forEach((product, index) => {
          const section = document.createElement("section");
          section.className = sectionClass(product);
          section.id = product.id;
          section.setAttribute("aria-labelledby", `product-title-${product.id}`);
          section.dataset.productId = product.id;

          const title = document.createElement("h1");
          title.className = titleClass(product);
          title.id = `product-title-${product.id}`;
          title.dataset.parallax = "title";
          title.textContent = product.title;

          const visual = document.createElement("div");
          visual.className = "product-visual";

          // Create the product image element
          const image = document.createElement("img");
          image.className = "product-photo";
          image.dataset.parallax = "photo";
          // Use menuImage if defined; otherwise fall back to the original image
          image.src = product.menuImage || product.image;
          image.alt = product.alt;
          // Load the first image eagerly for better UX; others can be lazy loaded
          image.loading = index === 0 || product.eager ? "eager" : "lazy";
          image.decoding = "async";

          // Wrap the image in an anchor so clicking the product photo opens the full image
          const link = document.createElement("a");
          link.href = product.image;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.append(image);

          const arrowWrap = document.createElement("div");
          arrowWrap.className = "visual-arrow";
          arrowWrap.setAttribute("aria-hidden", "true");

          const arrow = document.createElement("img");
          arrow.className = "scroll-arrow";
          arrow.src = "FRECCIA.svg";
          arrow.alt = "";
          arrow.setAttribute("aria-hidden", "true");

          arrowWrap.append(arrow);
          // Append the link (containing the image) and arrow to the visual container
          visual.append(link, arrowWrap);

          const price = document.createElement("div");
          price.className = "price";
          price.setAttribute("aria-label", `Prezzo ${formatPrice(product.price)}`);
          price.textContent = formatPrice(product.price);

          const ingredients = document.createElement("p");
          ingredients.className = "ingredients";
          product.ingredients.forEach((line, lineIndex) => {
            if (lineIndex > 0) ingredients.append(document.createElement("br"));
            ingredients.append(document.createTextNode(line));
          });

          const button = document.createElement("button");
          button.className = "mark-button";
          button.type = "button";
          button.textContent = "SEGNA";
          button.setAttribute("aria-pressed", "false");
          button.dataset.productId = product.id;

          section.append(title, visual, price, ingredients, button);
          fragment.append(section);
        });

        productList.append(fragment);
      }

      function updateButtons() {
        document.querySelectorAll(".mark-button").forEach((button) => {
          const isSelected = selected.has(button.dataset.productId);
          button.classList.toggle("is-selected", isSelected);
          button.setAttribute("aria-pressed", String(isSelected));
        });
        updateHeaderButton();
      }

      function updateHeaderButton() {
        const isOrderOpen = !orderView.hidden;
        const selectedSize = selected.size;

        if (isOrderOpen) {
          menuButtonLabel.textContent = "MENÙ";
          menuButton.setAttribute("aria-label", "Torna al menu");
          menuButton.classList.remove("is-filled");
          orderCount.hidden = true;
          previousSelectedSize = selectedSize;
          return;
        }

        menuButtonLabel.textContent = "VAI AI TUOI SPICCHI";
        menuButton.setAttribute("aria-label", "Vai ai tuoi spicchi");
        menuButton.classList.toggle("is-filled", selectedSize > 0);
        orderCount.textContent = selectedSize;
        orderCount.hidden = selectedSize === 0;

        if (selectedSize > previousSelectedSize) {
          orderCount.classList.remove("is-bouncing");
          void orderCount.offsetWidth;
          orderCount.classList.add("is-bouncing");
        }

        previousSelectedSize = selectedSize;
      }

      function renderOrder() {
        orderGrid.textContent = "";
        const chosen = products.filter((product) => selected.has(product.id));
        emptyOrder.hidden = chosen.length > 0;
        totalBar.hidden = chosen.length === 0;

        chosen.forEach((product) => {
          const card = document.createElement("article");
          card.className = "order-card";
          card.dataset.productId = product.id;

          const title = document.createElement("h2");
          title.className = `order-card__title${product.title.length > 10 ? " is-small" : ""}`;
          title.textContent = product.title;

           // Create the product image for the order card
           const image = document.createElement("img");
           image.className = "order-card__img";
           image.src = product.image;
           image.alt = product.alt;
           image.loading = "lazy";
           image.decoding = "async";

           // Wrap the order image in a link to open the full-size image in a new tab
           const link = document.createElement("a");
           link.href = product.image;
           link.target = "_blank";
           link.rel = "noopener noreferrer";
           link.append(image);

           const meta = document.createElement("p");
           meta.className = "order-card__meta";
           meta.textContent = formatPrice(product.price);

           // Append the elements to the card: title, linked image, and meta
           card.append(title, link, meta);
           orderGrid.append(card);
        });

        const total = chosen.reduce((sum, product) => sum + product.price, 0);
        totalValue.textContent = formatPrice(total);
      }

      function showOrder() {
        renderOrder();
        menuView.hidden = true;
        orderView.hidden = false;
        updateHeaderButton();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function showMenu() {
        orderView.hidden = true;
        menuView.hidden = false;
        updateHeaderButton();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function setupReveal() {
        const revealObserver = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-visible");
              revealObserver.unobserve(entry.target);
            }
          });
        }, { threshold: 0.25 });

        document.querySelectorAll(".product-photo").forEach((image) => revealObserver.observe(image));
      }

      let ticking = false;

      function applyParallax() {
        ticking = false;
      }

      window.addEventListener("scroll", () => {
        if (!ticking) {
          window.requestAnimationFrame(applyParallax);
          ticking = true;
        }
      }, { passive: true });

      productList.addEventListener("click", (event) => {
        const button = event.target.closest(".mark-button");
        if (!button) return;

        if (selected.has(button.dataset.productId)) {
          selected.delete(button.dataset.productId);
        } else {
          selected.add(button.dataset.productId);
        }

        updateButtons();
      });

      menuButton.addEventListener("click", () => {
        if (orderView.hidden) {
          showOrder();
        } else {
          showMenu();
        }
      });
      openOrderButton.addEventListener("click", showOrder);
      backButton.addEventListener("click", showMenu);

      renderProducts();
      setupReveal();
      updateHeaderButton();
      applyParallax();

      if (window.location.hash) {
        const target = document.querySelector(window.location.hash);
        target?.scrollIntoView();
      }
    </script>
  </body>
