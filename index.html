<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Clove - Menu</title>
<meta name="description" content="Menu digitale Clove Roma. Segna i tuoi spicchi e mostra il conto al banco.">
<style>
@import url("https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;700;800;900&display=swap");
:root{--purple:#5c2a80;--cream:#f2eee9;--paper:#fffefa;--red:#d64332;--line:rgba(92,42,128,.22);--h:78px}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-width:320px;background:#e9e3dc;color:var(--purple);font-family:Obviously,"Barlow Condensed","Arial Narrow",Arial,sans-serif;-webkit-font-smoothing:antialiased}button{font:inherit;color:inherit}.shell{width:min(100%,558px);min-height:100svh;margin:0 auto;background:var(--cream);border-left:1px solid rgba(92,42,128,.12);border-right:1px solid rgba(92,42,128,.12);overflow:hidden}.top{position:sticky;top:0;z-index:50;height:var(--h);display:flex;align-items:center;justify-content:space-between;gap:14px;padding:0 22px;background:rgba(242,238,233,.94);backdrop-filter:blur(14px);border-bottom:2px solid var(--purple)}.logo{width:102px;height:25px;object-fit:contain}.topbtn{min-width:154px;min-height:38px;padding:6px 18px;border:2px solid var(--purple);border-radius:999px;background:transparent;font-size:20px;font-weight:900;line-height:.9;text-transform:uppercase;transform:scaleX(.82);cursor:pointer}.topbtn.full{background:var(--purple);color:var(--paper)}.count{display:inline-grid;place-items:center;min-width:21px;height:21px;margin-left:7px;border-radius:50%;background:currentColor;color:var(--cream);font-size:13px;transform:scaleX(1.22)}.full .count{background:var(--paper);color:var(--purple)}.count:empty{display:none}.tabs{position:sticky;top:var(--h);z-index:45;display:flex;gap:10px;padding:12px 16px;background:rgba(242,238,233,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{flex:0 0 auto;padding:8px 19px 10px;border:2px solid var(--purple);border-radius:999px;background:transparent;font-size:22px;font-weight:900;line-height:1;text-decoration:none;text-transform:uppercase;transform:scaleX(.82);transform-origin:left;color:var(--purple)}.tab.active{background:var(--purple);color:var(--paper)}.info{padding:28px 38px 20px;border-bottom:2px solid rgba(92,42,128,.18)}.info-row{display:flex;justify-content:space-between;gap:16px;padding:9px 0 10px;border-top:1.5px solid var(--purple);font-size:23px;font-weight:900;line-height:1;text-transform:uppercase}.info-row:last-child{border-bottom:1.5px solid var(--purple)}.info a{color:var(--purple);text-decoration:none}.section-label{margin:0;padding:52px 18px 8px;font-size:16px;font-weight:900;text-align:center;text-transform:uppercase;letter-spacing:0}.product{position:relative;min-height:calc(100svh - var(--h));padding:52px 16px 44px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;border-bottom:1px solid rgba(92,42,128,.16);scroll-margin-top:calc(var(--h) + 62px)}.product h2{position:relative;z-index:1;width:max-content;margin:0 auto;color:var(--purple);font-size:clamp(90px,25.5vw,148px);font-weight:900;line-height:.78;letter-spacing:0;text-align:center;text-transform:uppercase;white-space:nowrap;transform:scaleX(.72);transform-origin:center;transition:transform .18s ease}.product.is-long h2{font-size:clamp(58px,16vw,86px)}.product img.food{z-index:2;width:min(86vw,420px);height:310px;margin:-10px auto 0;object-fit:contain;filter:drop-shadow(0 18px 17px rgba(43,14,88,.05));transition:transform .25s ease}.product:nth-of-type(2n) img.food{transform:translateY(3px) rotate(.5deg)}.price{margin:-4px auto 4px;font-size:clamp(50px,14vw,70px);font-weight:900;line-height:.82;text-align:center;transform:scaleX(.78)}.desc{width:min(100%,500px);margin:5px auto 0;font-size:clamp(21px,5.7vw,27px);font-weight:500;line-height:1.02;text-align:center;text-transform:uppercase;transform:scaleX(.82)}.segna{min-width:232px;min-height:58px;margin-top:22px;padding:8px 44px;border:2px solid var(--purple);border-radius:999px;background:transparent;font-size:34px;font-weight:900;line-height:.9;text-transform:uppercase;transform:scaleX(.84);cursor:pointer}.segna.on{background:var(--purple);color:var(--paper)}.qty{display:none;align-items:center;width:min(82vw,320px);height:54px;margin-top:16px;border:3px solid var(--purple);border-radius:999px;overflow:hidden}.product.has-qty .qty{display:flex}.product.has-qty .segna{display:none}.qty button,.qty b{height:100%;display:grid;place-items:center;font-size:34px;font-weight:900}.qty button{width:29%;border:0;background:var(--paper);cursor:pointer}.qty b{width:42%;background:var(--purple);color:var(--paper)}.simple-section{padding:48px 22px 54px;border-bottom:1px solid var(--line);scroll-margin-top:calc(var(--h) + 62px)}.simple-section h2,.order h1{margin:0 0 24px;font-size:clamp(58px,15vw,88px);font-weight:900;line-height:.8;text-align:center;text-transform:uppercase;white-space:nowrap;transform:scaleX(.72)}.list{display:grid;gap:12px}.row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:16px;padding:15px 0;border-top:1.5px solid var(--purple);font-size:24px;font-weight:900;text-transform:uppercase;line-height:.95}.row:last-child{border-bottom:1.5px solid var(--purple)}.row small{display:block;margin-top:5px;font-size:16px;font-weight:500;line-height:1;text-transform:uppercase}.money{font-size:29px;font-weight:900;white-space:nowrap}.badge{display:inline-flex;align-items:center;margin:0 7px 5px 0;padding:4px 8px 5px;border:1.5px solid var(--purple);border-radius:999px;font-size:13px;font-weight:900;line-height:.9}.order-cta{padding:58px 18px 72px;display:grid;place-items:center}.bigbtn{width:min(88vw,390px);min-height:64px;border:0;border-radius:999px;background:var(--purple);color:var(--paper);font-size:34px;font-weight:900;text-transform:uppercase;line-height:.9;transform:scaleX(.84);cursor:pointer}.order{min-height:calc(100svh - var(--h));position:relative;padding:52px 18px 78px;overflow:hidden}.order:before{content:"";position:absolute;inset:0;background:linear-gradient(rgba(92,42,128,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(92,42,128,.055) 1px,transparent 1px);background-size:34px 34px;mask-image:linear-gradient(to bottom,transparent,#000 10%,#000 90%,transparent);pointer-events:none}.order>*{position:relative}.order h1{margin-bottom:40px}.order h1:after{content:"SEGNATI";display:inline-block;margin-left:-25px;padding:5px 12px;border:2px solid var(--purple);border-radius:999px;background:var(--cream);font-size:19px;line-height:.9;transform:rotate(-8deg) scaleX(.84)}.hint{width:min(92%,420px);margin:-14px auto 28px;font-size:24px;font-weight:700;line-height:1;text-align:center;text-transform:uppercase;transform:scaleX(.82)}.order-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px 13px}.card{position:relative;min-height:220px;padding:47px 9px 15px;display:grid;grid-template-rows:1fr auto;align-items:center;justify-items:center;background:var(--paper);border:1.5px solid rgba(92,42,128,.42);box-shadow:0 10px 0 rgba(92,42,128,.05);transform:rotate(-1.2deg)}.card:nth-child(2n){transform:rotate(1.1deg)}.card:before{content:"";position:absolute;top:-11px;left:50%;z-index:2;width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 31% 28%,rgba(255,255,255,.72) 0 13%,transparent 14%),var(--purple);box-shadow:4px 6px 0 rgba(92,42,128,.08),1px 3px 5px rgba(43,14,88,.13);transform:translateX(-50%)}.card h3{position:absolute;top:39px;left:50%;z-index:1;width:max-content;margin:0;font-size:40px;font-weight:900;line-height:.78;text-transform:uppercase;white-space:nowrap;transform:translateX(-50%) scaleX(.72)}.card h3.small{font-size:29px}.card img{z-index:2;max-width:104%;max-height:126px;object-fit:contain;filter:drop-shadow(0 9px 10px rgba(43,14,88,.05))}.card p{z-index:3;margin:0;font-size:25px;font-weight:900;line-height:.9;transform:scaleX(.82)}.remove{position:absolute;right:8px;top:8px;z-index:3;width:25px;height:25px;border:1.5px solid var(--purple);border-radius:50%;background:var(--paper);font-size:18px;font-weight:900;line-height:1;cursor:pointer}.total{width:min(100%,390px);margin:44px auto 0;text-align:center}.total span{display:block;font-size:clamp(37px,10vw,56px);font-weight:900;line-height:.85;text-transform:uppercase;transform:scaleX(.78)}.total b{display:block;margin-top:2px;font-size:clamp(78px,21vw,116px);font-weight:900;line-height:.82;transform:scaleX(.78)}.copy-note{display:none;margin:24px auto 0;padding:13px 20px;border:2px solid var(--purple);border-radius:999px;background:transparent;font-size:24px;font-weight:900;text-transform:uppercase;line-height:.9;transform:scaleX(.84)}.copy-note.show{display:block}.empty{margin:50px auto 28px;max-width:310px;padding:30px 18px;background:var(--paper);border:1.5px solid rgba(92,42,128,.45);box-shadow:0 10px 0 rgba(92,42,128,.05);font-size:30px;font-weight:900;line-height:.95;text-align:center;text-transform:uppercase;transform:scaleX(.82)}.toast{position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:30px;background:var(--purple);color:var(--paper);font-size:clamp(58px,16vw,95px);font-weight:900;line-height:.82;text-align:center;text-transform:uppercase;transform:translateY(100%);transition:transform .38s cubic-bezier(.2,.86,.2,1);pointer-events:none}.toast.show{transform:translateY(0)}.float{position:fixed;right:max(16px,calc((100vw - 558px)/2 + 18px));bottom:86px;z-index:60;width:48px;height:130px;border:0;background:transparent;padding:0;cursor:pointer;animation:float 2.7s ease-in-out infinite;transition:filter .2s ease,transform .2s ease}.float img{width:100%;height:100%;object-fit:contain}.float:after{content:"SU";position:absolute;right:2px;top:-24px;padding:5px 8px;border:1.5px solid var(--red);border-radius:999px;background:var(--cream);color:var(--red);font-size:14px;font-weight:900;line-height:.9;opacity:0;transform:translateY(8px) rotate(-7deg);transition:.2s}.float.bottom{filter:sepia(1) saturate(5) hue-rotate(325deg) brightness(.95)}.float.bottom:after{opacity:1;transform:translateY(0) rotate(-7deg)}.float.up{animation:none;transform:rotate(180deg) translateY(5px)}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}.hidden{display:none!important}@media(max-width:374px){.top{padding:0 17px}.logo{width:88px}.topbtn{min-width:142px;font-size:17px}.product h2{font-size:88px}.product.is-long h2{font-size:50px}.product img.food{height:285px}.desc{font-size:20px}.order-grid{gap:11px}.card{min-height:198px}.card h3{font-size:35px}.card h3.small{font-size:26px}}
</style>
</head>
<body>
<div class="shell">
<header class="top"><img class="logo" src="logo-clove-purple.png" alt="Clove"><button class="topbtn" id="orderBtn">I TUOI SPICCHI <span class="count" id="count"></span></button></header>
<nav class="tabs" id="tabs"><a class="tab active" href="#spicchi">Spicchi</a><a class="tab" href="#fritti">Fritti</a><a class="tab" href="#dolci">Dolci</a><a class="tab" href="#bevande">Bevande</a><a class="tab" href="#birre">Birre</a><a class="tab" href="#vini">Vini</a></nav>
<main id="menuView">
<section class="info"><div class="info-row"><span>Via dei Gracchi 229</span><span>Roma</span></div><div class="info-row"><span>17 Maggio 2026</span><span>100% lievito madre</span></div><div class="info-row"><a href="https://www.instagram.com/clove.roma/">@clove.roma</a><a href="https://www.instagram.com/amaliacostantini/">@amaliacostantini</a></div></section>
<div id="spicchi"></div><div id="products"></div>
<section class="simple-section" id="fritti"><h2>Fritti</h2><div class="list" id="fried"></div></section>
<section class="simple-section" id="dolci"><h2>Dolci</h2><div class="list" id="desserts"></div></section>
<section class="simple-section" id="bevande"><h2>Bevande</h2><div class="list" id="drinks"></div></section>
<section class="simple-section" id="birre"><h2>Birre</h2><div class="list" id="beers"></div></section>
<section class="simple-section" id="vini"><h2>Vini</h2><div class="list" id="wines"></div></section>
<section class="order-cta"><button class="bigbtn" id="openOrder">Il tuo ordine</button></section>
</main>
<section class="order hidden" id="orderView"><h1>I tuoi spicchi</h1><p class="hint">Mostralo al banco o usalo per non perdere il filo.</p><div class="order-grid" id="grid"></div><p class="empty hidden" id="empty">Ancora niente segnato</p><div class="total" id="totalBox"><span>Totale:</span><b id="total">0,00€</b></div><button class="copy-note" id="copyBtn">Copia ordine</button><button class="bigbtn" id="backBtn" style="display:block;margin:34px auto 0;background:transparent;color:var(--purple);border:2px solid var(--purple)">Torna al menu</button></section>
</div><button class="float" id="arrow" aria-label="Torna su"><img src="FRECCIA.svg" alt=""></button><div class="toast" id="toast">Tieni il conto<br>dei tuoi spicchi</div>
<script>
const products=[
{id:'n1',t:'NUMERO 1',name:'Capocollo',d:'Capocollo di Martina Franca / stracciatella / oliva taggiasca',p:350,img:'NUMERO_1_cut.png'},
{id:'n2',t:'NUMERO 2',name:'Melanzana',d:'Melanzana arrosto / crema di pomodoro / stracciatella / parmigiano / basilico / crumble di pane',p:350,img:'NUMERO_2_cut.png'},
{id:'n3',t:'NUMERO 3',name:'Zucchine',d:'Zucchine alla scapece / julienne di carote arrosto / ricotta artigianale',p:350,img:'NUMERO_3_cut.png'},
{id:'n4',t:'NUMERO 4',name:'Stracciata semi dry',d:'Stracciata / pomodoro semi dry / pesto leggero / basilico',p:350,img:'NUMERO_4_cut.png'},
{id:'n5',t:'NUMERO 5',name:'Guanciale tartufo',d:'Guanciale affumicato al legno di faggio / stracciatella pugliese / tartufo / pomodorino caramellato',p:350,img:'NUMERO_5_menu.png'},
{id:'n6',t:'NUMERO 6',name:'Roast Beef',d:'Roast beef / patata dolce / salsa tonnata / pomodorino semi dry / misticanza',p:450,img:'NUMERO_6_cut.png'},
{id:'n7',t:'NUMERO 7',name:'Prosciutto di Parma',d:'Prosciutto di Parma 30 mesi San Giacomo / stracciatella',p:450,img:'NUMERO_7_cut.png',long:true},
{id:'n8',t:'NUMERO 8',name:'Ricciola',d:'Carpaccio di ricciola marinato / jalapeno / passion fruit / tartufo / pepe bianco / olio evo',p:450,img:'NUMERO_8_cut.png'},
{id:'n9',t:'NUMERO 9',name:'Jamon Iberico',d:'Jamon cocido 100% iberico Beher / stracciatella pugliese / olio evo / misticanza di erbe spontanee',p:450,img:'NUMERO_9_cut.png'},
{id:'n10',t:'NUMERO 10',name:'Gambero',d:'Gambero rosso di Mazara del Vallo / avocado / frutto della passione / lime / pepe rosa',p:450,img:'NUMERO_10_cut.png'}];
const fried=[{id:'mini-suppli',n:'Mini supplì',d:'Guacamole di avocado / passion fruit / pepe rosa e lime / gambero rosso di Mazara / olio evo / polvere di carapace',p:300,img:'MINI_SUPPLI_menu.png'},{id:'polpette-veg',n:'Polpette veg',d:'Patata dolce / ceci / zenzero / maionese alla curcuma',p:300,img:'POLPETTE_VEG_cut.png'},{id:'polpettine',n:'Polpettine',d:'Polpettine di carne e olive / maionese alle olive',p:400,img:'POLPETTINE_menu.png'}];
const desserts=[{id:'crema-pasticcera',n:'Crema Pasticcera',d:'Crema pasticcera / caramello / zucchero a velo',p:450,img:'PASTICCERA_cut.png'},{id:'crema-vaniglia',n:'Crema Vaniglia',d:'Crema alla vaniglia / caramello / zucchero a velo',p:450,img:'CREMA_LATTE_cut.png'},{id:'gianduia',n:'Gianduia',d:'Cioccolato gianduia / zucchero a velo / granella di nocciola',p:450,img:'GIANDUIA_cut.png'}];
const drinks=[['Acqua',200,'50 cl'],['Chinotto',250,''],['Aranciata',250,''],['Limonata',250,''],['Gassosa',250,''],['Coca Cola',250,''],['Coca Cola Zero',250,'']];
const beers=[['Arbor Ales - My Little Sabrony',600,'IPA'],['Arbor Ales - Mosaic',600,'IPA'],['Arbor Ales - Shangri-La',600,'Session IPA']];
const wines=[['Ca del Vént - Franciacorta Pas Operé',4000,'Bottiglia'],['Ca del Vént - Blanc de Noirs',4500,'Bottiglia'],['Bianco della casa',600,'Mescita'],['Rosso della casa',600,'Mescita']];
const order={};const fmt=c=>(c/100).toFixed(2).replace('.',',')+'€';const all=[...products,...fried.map(x=>({id:x.id,t:x.n,name:x.n,d:x.d,p:x.p,img:x.img,long:x.n.length>13})),...desserts.map(x=>({id:x.id,t:x.n,name:x.n,d:x.d,p:x.p,img:x.img,long:x.n.length>13}))];
function row(item){return `<div class="row"><div>${item[0]}${item[2]?`<small>${item[2]}</small>`:''}</div><div class="money">${fmt(item[1])}</div></div>`}
function addableRow(x){return `<div class="row"><div>${x.n}<small>${x.d}</small></div><div><button class="segna" style="min-width:96px;min-height:42px;margin:0;font-size:23px;padding:7px 18px" data-add="${x.id}">Segna</button></div></div>`}
function render(){document.getElementById('products').innerHTML=products.map(x=>`<section class="product ${x.long?'is-long':''}" id="${x.id}"><h2>${x.t}</h2><img class="food" src="${x.img}" alt="${x.name}"><div class="price">${fmt(x.p)}</div><p class="desc">${x.d}</p><button class="segna" data-add="${x.id}">Segna</button><div class="qty"><button data-dec="${x.id}">-</button><b id="q-${x.id}">0</b><button data-add="${x.id}">+</button></div></section>`).join('');document.getElementById('fried').innerHTML=fried.map(addableRow).join('');document.getElementById('desserts').innerHTML=desserts.map(addableRow).join('');document.getElementById('drinks').innerHTML=drinks.map(row).join('');document.getElementById('beers').innerHTML=beers.map(row).join('');document.getElementById('wines').innerHTML=wines.map(x=>`<div class="row"><div><span class="badge">${x[2].toUpperCase()}</span>${x[0]}</div><div class="money">${fmt(x[1])}</div></div>`).join('');sync()}
function sync(){let n=0,total=0;Object.entries(order).forEach(([id,q])=>{const p=all.find(x=>x.id===id);if(p){n+=q;total+=q*p.p}});document.getElementById('count').textContent=n?String(n):'';document.getElementById('orderBtn').classList.toggle('full',n>0);document.querySelectorAll('.product').forEach(s=>{const q=order[s.id]||0;s.classList.toggle('has-qty',q>0);const b=document.getElementById('q-'+s.id);if(b)b.textContent=q});document.querySelectorAll('[data-add]').forEach(b=>b.classList.toggle('on',(order[b.dataset.add]||0)>0));document.getElementById('total').textContent=fmt(total);renderOrder(n,total)}
function renderOrder(n,total){const grid=document.getElementById('grid');grid.innerHTML=Object.entries(order).flatMap(([id,q])=>{const p=all.find(x=>x.id===id);return p?Array.from({length:q},()=>`<article class="card"><button class="remove" data-dec="${id}">×</button><h3 class="${p.t.length>10?'small':''}">${p.t}</h3><img src="${p.img}" alt="${p.name}"><p>${fmt(p.p)} × 1</p></article>`):[]}).join('');document.getElementById('empty').classList.toggle('hidden',n>0);document.getElementById('totalBox').classList.toggle('hidden',n===0);document.getElementById('copyBtn').classList.toggle('show',n>0)}
document.addEventListener('click',e=>{const a=e.target.closest('[data-add]');const d=e.target.closest('[data-dec]');if(a){order[a.dataset.add]=(order[a.dataset.add]||0)+1;sync()}if(d){const id=d.dataset.dec;order[id]=Math.max(0,(order[id]||0)-1);if(!order[id])delete order[id];sync()}});
function showOrder(){document.getElementById('toast').classList.add('show');setTimeout(()=>{document.getElementById('toast').classList.remove('show');document.getElementById('menuView').classList.add('hidden');document.getElementById('tabs').classList.add('hidden');document.getElementById('orderView').classList.remove('hidden');document.getElementById('orderBtn').textContent='MENÙ';scrollTo({top:0,behavior:'smooth'})},650)}
function showMenu(){document.getElementById('orderView').classList.add('hidden');document.getElementById('menuView').classList.remove('hidden');document.getElementById('tabs').classList.remove('hidden');document.getElementById('orderBtn').innerHTML='I TUOI SPICCHI <span class="count" id="count"></span>';sync();scrollTo({top:0,behavior:'smooth'})}
document.getElementById('openOrder').onclick=showOrder;document.getElementById('orderBtn').onclick=()=>document.getElementById('orderView').classList.contains('hidden')?showOrder():showMenu();document.getElementById('backBtn').onclick=showMenu;document.getElementById('copyBtn').onclick=async()=>{const lines=Object.entries(order).map(([id,q])=>{const p=all.find(x=>x.id===id);return p?`${q} x ${p.name} - ${fmt(p.p*q)}`:''}).filter(Boolean);const txt='CLOVE - ordine\n'+lines.join('\n')+'\nTotale: '+document.getElementById('total').textContent;try{await navigator.clipboard.writeText(txt);document.getElementById('copyBtn').textContent='Copiato'}catch{document.getElementById('copyBtn').textContent='Ordine pronto'}};
const arrow=document.getElementById('arrow');arrow.onclick=()=>{arrow.classList.add('up');scrollTo({top:0,behavior:'smooth'});setTimeout(()=>arrow.classList.remove('up'),900)};addEventListener('scroll',()=>{const bottom=document.documentElement.scrollHeight-innerHeight-scrollY<460&&scrollY>420;arrow.classList.toggle('bottom',bottom);document.querySelectorAll('.product h2').forEach(h=>{const r=h.getBoundingClientRect();if(r.top<innerHeight&&r.bottom>0)h.style.transform=`scaleX(.72) translateY(${Math.max(-8,Math.min(8,(innerHeight/2-r.top)*.015))}px)`})},{passive:true});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active')});render();
</script>
</body>
</html>
